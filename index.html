<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CineSearch - Search TV shows and movies using TMDB.">
  <title>CineSearch</title>
  
  <!-- Dış Kaynaklar -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Kendi CSS Dosyamız -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-custom">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="navbar-brand-text" style="cursor: pointer;" id="logoBrand">Cine Search</span>
    
    <!-- Navigasyon -->
    <div class="nav-menu d-none d-md-flex">
      <a href="#" class="nav-link active" data-action="home">Ana Sayfa</a>
      <a href="#" class="nav-link" data-action="new">Yeni</a>
      <a href="#" class="nav-link" data-action="popular">Popüler</a>
      <a href="#" class="nav-link" data-action="lists">Listele</a>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <h1>Cine Search <span class="gradient">Filmin Adresi</span></h1>
    <p>Binlerce Filmi Keşfet — powered by TMDB.</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" class="form-control" placeholder="Ara..." autocomplete="off">
      <button class="btn btn-search" id="searchBtn">BUL</button>
    </div>
  </div>
</section>

<!-- Sonuçlar & Filtreler -->
<section class="results-section" id="resultsSection">
  <div class="container">
    
    <!-- Sadece Başlık ve Tür Filtresi -->
    <div class="filter-bar d-flex flex-wrap gap-3 align-items-center justify-content-between mb-4">
      <h2 id="sectionTitle" class="section-title mb-0">Popüler Filmler</h2>
      
      <div class="d-flex flex-wrap gap-2">
        <select id="genreSelect" class="form-select form-select-sm custom-filter" aria-label="Tür Seçin">
          <option value="">Tüm Türler</option>
          <option value="28">Aksiyon</option>
          <option value="12">Macera</option>
          <option value="16">Animasyon</option>
          <option value="878">Bilim Kurgu</option>
          <option value="18">Dram</option>
          <option value="14">Fantastik</option>
          <option value="53">Gerilim</option>
          <option value="35">Komedi</option>
          <option value="27">Korku</option>
          <option value="10749">Romantik</option>
          <option value="80">Suç</option>
        </select>
      </div>
    </div>
    
    <!-- Yükleme Durumu ve Grid -->
    <div id="statusArea"></div>
    <div class="row g-4" id="resultsGrid"></div>

    <!-- Pagination (Sayfalama) -->
    <div class="pagination-wrapper d-none" id="paginationWrapper">
      <button class="btn btn-page" id="prevPage">Önceki</button>
      <span class="page-info" id="pageInfo">Sayfa 1 / 1</span>
      <button class="btn btn-page" id="nextPage">Sonraki</button>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer-custom">
  Powered by <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB API</a> &bull; CineSearch &copy; 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
